<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan's Finance Fairway!</title>
    <style>
        body { margin: 0; padding: 0; background-color: #e0f7fa; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 800px; height: 300px; background-color: #aed581; border-bottom: 20px solid #558b2f; position: relative; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #score-board { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #333; z-index: 10; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #333; z-index: 20; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; border: 2px solid #558b2f; width: 320px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 4px; margin-top: 10px; }

        /* CHARACTER BOX */
        #player {
            width: 100px; height: 100px; position: absolute; bottom: 0px; left: 50px;
            background-image: url('standing_1.png');
            background-repeat: no-repeat;
            background-size: contain; 
            background-position: center bottom;
            background-color: #aed581; /* Matches fairway green */
            z-index: 5;
            transition: bottom 0.3s ease-out;
        }

        /* DANGEROUS OBSTACLES */
        .obstacle { position: absolute; bottom: 0; z-index: 4; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .finance-error { width: 100px; height: 40px; background: #ff5252; color: white; font-size: 11px; border-radius: 4px; text-align: center; border: 2px solid #b71c1c; box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        
        .golf-flag { width: 60px; height: 60px; font-size: 40px; }
        .golf-flag::after { content: '⛳'; }
        
        /* HARMLESS DECORATIONS */
        .decoration { position: absolute; bottom: 0; opacity: 0.4; font-size: 24px; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        <div id="player"></div>
        <div id="message">
            <h2>Good luck on the new role, Ryan!</h2>
            <p>Jump over the Bad Data & Flags.</p>
            <button onclick="startGame()">Tee Off!</button>
        </div>
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const messageElement = document.getElementById('message');
    
    let score = 0, isGameOver = true, isJumping = false, gameSpeed = 6;
    let gameLoopInterval, obstacleTimer, animInterval, decorTimer;
    let runFrame = 1;

    document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    container.addEventListener('mousedown', jump);

    function updateAnimation() {
        if (isGameOver) {
            player.style.backgroundImage = "url('standing_1.png')";
            return;
        }
        if (isJumping) {
            player.style.backgroundImage = "url('jump_1.png')";
        } else {
            runFrame = (runFrame === 1) ? 2 : 1;
            player.style.backgroundImage = (runFrame === 1) ? "url('running_1.png')" : "url('standing_1.png')";
        }
    }

    function jump() {
        if (isGameOver || isJumping) return;
        isJumping = true;
        updateAnimation();
        player.style.bottom = "150px"; 
        setTimeout(() => { player.style.transition = "bottom 0.25s ease-in"; player.style.bottom = "0px"; }, 350);
        setTimeout(() => { player.style.transition = "bottom 0.3s ease-out"; isJumping = false; updateAnimation(); }, 600);
    }

    function startGame() {
        if (!isGameOver) return;
        score = 0; gameSpeed = 6; isGameOver = false;
        messageElement.style.display = 'none';
        clearInterval(animInterval);
        animInterval = setInterval(updateAnimation, 150);
        document.querySelectorAll('.obstacle, .decoration').forEach(el => el.remove());
        gameLoop();
        scheduleObstacle();
        scheduleDecoration();
    }

    function gameOver() {
        isGameOver = true;
        clearInterval(animInterval);
        clearTimeout(obstacleTimer);
        clearTimeout(decorTimer);
        player.style.backgroundImage = "url('standing_1.png')";
        
        const failureMessages = ["Budget Overrun!", "Data Discrepancy!", "Out of Bounds!", "Missing Forecast!", "Audit Required!"];
        const randomMsg = failureMessages[Math.floor(Math.random() * failureMessages.length)];
        
        messageElement.innerHTML = `<h2>${randomMsg}</h2><p>Final Score: ${Math.floor(score/10)}</p><button onclick="startGame()">Try Another Round</button>`;
        messageElement.style.display = 'block';
    }

    function gameLoop() {
        if (isGameOver) return;
        score++;
        scoreElement.innerText = Math.floor(score / 10);
        gameSpeed += 0.001;
        
        document.querySelectorAll('.obstacle, .decoration').forEach(el => {
            let currentLeft = parseFloat(el.style.left);
            el.style.left = (currentLeft - gameSpeed) + 'px';
            if (currentLeft < -150) el.remove();
        });

        const p = player.getBoundingClientRect();
        document.querySelectorAll('.obstacle').forEach(obs => {
            const o = obs.getBoundingClientRect();
            // Collision detection
            if (p.right - 45 > o.left && p.left + 45 < o.right && p.bottom > o.top + 10) {
                gameOver();
            }
        });
        gameLoopInterval = requestAnimationFrame(gameLoop);
    }

    function scheduleObstacle() {
        if (isGameOver) return;
        const obstacle = document.createElement('div');
        obstacle.classList.add('obstacle');
        
        if(Math.random() > 0.5) {
            obstacle.classList.add('finance-error');
            const financeTerms = ["DATA ERROR", "LATE REPORT", "RECON FAIL", "BAD FORM"];
            obstacle.innerText = financeTerms[Math.floor(Math.random() * financeTerms.length)];
        } else {
            obstacle.classList.add('golf-flag');
        }
        
        obstacle.style.left = '850px';
        container.appendChild(obstacle);
        obstacleTimer = setTimeout(scheduleObstacle, 1200 + Math.random() * 2000);
    }

    // Harmless bushes and grass
    function scheduleDecoration() {
        if (isGameOver) return;
        const decor = document.createElement('div');
        decor.classList.add('decoration');
        const natureItems = ['🌳', '🌿', '🌱', '🍃'];
        decor.innerText = natureItems[Math.floor(Math.random() * natureItems.length)];
        decor.style.left = '850px';
        // Placed slightly higher or lower for variety
        decor.style.bottom = (Math.random() * 15) + 'px';
        container.appendChild(decor);
        decorTimer = setTimeout(scheduleDecoration, 800 + Math.random() * 1500);
    }
</script>
</body>
</html>
