<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye Golf Run!</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #e0f7fa; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        #game-container { 
            width: 800px; 
            height: 300px; 
            background-color: #aed581; 
            border-bottom: 20px solid #558b2f; 
            position: relative; 
            overflow: hidden; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        #score-board { 
            position: absolute; 
            top: 10px; 
            right: 20px; 
            font-size: 24px; 
            color: #333; 
            z-index: 10; 
        }
        #message { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            color: #333; 
            z-index: 20; 
            background: rgba(255,255,255,0.9); 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px solid #558b2f; 
        }
        button { 
            padding: 10px 20px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 4px; 
        }

        /* THE CHARACTER BOX */
        #player {
            width: 100px; 
            height: 100px; 
            position: absolute; 
            bottom: 0px; 
            left: 50px;
            background-image: url('standing_1.png');
            background-repeat: no-repeat;
            background-size: contain; 
            background-position: center bottom;
            background-color: transparent; 
            z-index: 5;
            transition: bottom 0.3s ease-out;
        }

        .obstacle { position: absolute; bottom: 0; z-index: 4; }
        .sand-trap { width: 60px; height: 30px; background-color: #ffe082; border-radius: 50%; border: 2px solid #dca; }
        .golf-cart { width: 60px; height: 60px; font-size: 40px; display: flex; align-items: center; justify-content: center;}
        .golf-cart::after { content: '🛒'; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        <div id="player"></div>
        <div id="message">
            <h2>Good luck on the new team!</h2>
            <p>Press [SPACE] or Click to Jump.</p>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const messageElement = document.getElementById('message');
    
    let score = 0, isGameOver = true, isJumping = false, gameSpeed = 6;
    let gameLoopInterval, obstacleTimer, animInterval;
    let runFrame = 1;

    document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    container.addEventListener('mousedown', jump);

    // This handles swapping the images to create the animation[cite: 2]
    function updateAnimation() {
        if (isGameOver) {
            player.style.backgroundImage = "url('standing_1.png')";
            return;
        }
        
        if (isJumping) {
            player.style.backgroundImage = "url('jump_1.png')";
        } else {
            // Alternates between the standing pose and running pose[cite: 2]
            runFrame = (runFrame === 1) ? 2 : 1;
            const currentImg = (runFrame === 1) ? 'running_1.png' : 'standing_1.png';
            player.style.backgroundImage = `url('${currentImg}')`;
        }
    }

    function jump() {
        if (isGameOver || isJumping) return;
        isJumping = true;
        updateAnimation(); 
        player.style.bottom = "150px"; 

        setTimeout(() => {
            player.style.transition = "bottom 0.25s ease-in";
            player.style.bottom = "0px"; 
        }, 350);

        setTimeout(() => {
            player.style.transition = "bottom 0.3s ease-out";
            isJumping = false;
            updateAnimation(); 
        }, 600);
    }

    function startGame() {
        if (!isGameOver) return;
        score = 0; gameSpeed = 6; isGameOver = false;
        messageElement.style.display = 'none';
        
        // Feet start shuffling[cite: 2]
        clearInterval(animInterval);
        animInterval = setInterval(updateAnimation, 150);

        document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
        gameLoop();
        scheduleObstacle();
    }

    function gameOver() {
        isGameOver = true;
        clearInterval(animInterval);
        player.style.backgroundImage = "url('standing_1.png')";
        cancelAnimationFrame(gameLoopInterval);
        clearTimeout(obstacleTimer);
        messageElement.innerHTML = `<h2>GAME OVER</h2><p>Final Score: ${Math.floor(score/10)}</p><button onclick="startGame()">Play Again</button>`;
        messageElement.style.display = 'block';
    }

    function gameLoop() {
        if (isGameOver) return;
        score++;
        scoreElement.innerText = Math.floor(score / 10);
        gameSpeed += 0.001;
        
        document.querySelectorAll('.obstacle').forEach(obstacle => {
            let currentLeft = parseInt(obstacle.style.left);
            obstacle.style.left = (currentLeft - gameSpeed) + 'px';
            if (currentLeft < -100) obstacle.remove();
        });

        const p = player.getBoundingClientRect();
        document.querySelectorAll('.obstacle').forEach(obs => {
            const o = obs.getBoundingClientRect();
            // Narrowed collision detection for the wider character[cite: 2]
            if (p.right - 45 > o.left && p.left + 45 < o.right && p.bottom > o.top + 10) {
                gameOver();
            }
        });
        gameLoopInterval = requestAnimationFrame(gameLoop);
    }

    function scheduleObstacle() {
        if (isGameOver) return;
        const obstacle = document.createElement('div');
        obstacle.classList.add('obstacle');
        Math.random() > 0.5 ? obstacle.classList.add('sand-trap') : obstacle.classList.add('golf-cart');
        obstacle.style.left = '850px';
        container.appendChild(obstacle);
        obstacleTimer = setTimeout(scheduleObstacle, 1200 + Math.random() * 2000);
    }
</script>
</body>
</html>
