<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye Golf Run!</title>
    <style>
        body { margin: 0; padding: 0; background-color: #e0f7fa; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 800px; height: 300px; background-color: #aed581; border-bottom: 20px solid #558b2f; position: relative; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #score-board { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #333; z-index: 10; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #333; z-index: 20; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 10px; border: 2px solid #558b2f; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #333; color: white; border: none; border-radius: 4px; }

        /* CHARACTER SETTINGS: Calibrated to fit the full body */
        #player {
            width: 80px; 
            height: 80px; 
            position: absolute; 
            bottom: 0px; 
            left: 50px;
            background-image: url('character.png');
            background-repeat: no-repeat;
            background-color: white; /* Matches the JPG background so it looks like a clean box */
            
            /* Scaling the background-size 'pulls the camera back' */
            background-size: 350px auto; 
            
            z-index: 5;
            transition: bottom 0.3s ease-out;
            animation: runCycle 0.4s steps(1) infinite;
        }

        /* JUMP POSE: Points to the bottom-left character in your 2x2 grid */
        #player.jumping-pose {
            animation: none;
            background-position: -5px -190px; 
        }

        /* RUN CYCLE: Shifts between the top-middle and top-right poses */
        @keyframes runCycle {
            0% { background-position: -95px -5px; }
            50% { background-position: -190px -5px; }
            100% { background-position: -95px -5px; }
        }

        .obstacle { position: absolute; bottom: 0; z-index: 4; }
        .sand-trap { width: 60px; height: 30px; background-color: #ffe082; border-radius: 50%; border: 2px solid #dca; }
        .golf-cart { width: 60px; height: 60px; font-size: 40px; display: flex; align-items: center; justify-content: center;}
        .golf-cart::after { content: '🛒'; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-board">Score: <span id="score">0</span></div>
        <div id="player"></div>
        <div id="message">
            <h2>Good luck on the new team!</h2>
            <p>Press [SPACE] or Click to Jump.</p>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const messageElement = document.getElementById('message');
    let score = 0, isGameOver = true, isJumping = false, gameSpeed = 6, gameLoopInterval, obstacleTimer;

    document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    container.addEventListener('mousedown', jump);

    function jump() {
        if (isGameOver || isJumping) return;
        isJumping = true;
        player.classList.add('jumping-pose');
        player.style.bottom = "150px"; 

        setTimeout(() => {
            player.style.transition = "bottom 0.25s ease-in";
            player.style.bottom = "0px"; 
        }, 350);

        setTimeout(() => {
            player.classList.remove('jumping-pose');
            player.style.transition = "bottom 0.3s ease-out";
            isJumping = false;
        }, 600);
    }

    function startGame() {
        if (!isGameOver) return;
        score = 0; gameSpeed = 6; isGameOver = false;
        messageElement.style.display = 'none';
        document.querySelectorAll('.obstacle').forEach(obs => obs.remove());
        gameLoop();
        scheduleObstacle();
    }

    function gameOver() {
        isGameOver = true;
        cancelAnimationFrame(gameLoopInterval);
        clearTimeout(obstacleTimer);
        messageElement.innerHTML = `<h2>GAME OVER</h2><p>Final Score: ${Math.floor(score/10)}</p><button onclick="startGame()">Play Again</button>`;
        messageElement.style.display = 'block';
    }

    function gameLoop() {
        if (isGameOver) return;
        score++;
        scoreElement.innerText = Math.floor(score / 10);
        gameSpeed += 0.001;
        
        document.querySelectorAll('.obstacle').forEach(obstacle => {
            let currentLeft = parseInt(obstacle.style.left);
            obstacle.style.left = (currentLeft - gameSpeed) + 'px';
            if (currentLeft < -100) obstacle.remove();
        });

        const p = player.getBoundingClientRect();
        document.querySelectorAll('.obstacle').forEach(obs => {
            const o = obs.getBoundingClientRect();
            if (p.right - 25 > o.left && p.left + 25 < o.right && p.bottom > o.top + 10) {
                gameOver();
            }
        });
        gameLoopInterval = requestAnimationFrame(gameLoop);
    }

    function scheduleObstacle() {
        if (isGameOver) return;
        const obstacle = document.createElement('div');
        obstacle.classList.add('obstacle');
        Math.random() > 0.5 ? obstacle.classList.add('sand-trap') : obstacle.classList.add('golf-cart');
        obstacle.style.left = '850px';
        container.appendChild(obstacle);
        obstacleTimer = setTimeout(scheduleObstacle, 1200 + Math.random() * 2000);
    }
</script>
</body>
</html>
